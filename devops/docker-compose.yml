services:
  backend:
    build:
      context: ../backend
    container_name: backend_service
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - ai_engine
    networks:
      - app_network

  ai_engine:
    build:
      context: ../ai-engine
    container_name: ai_engine_service
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    networks:
      - app_network

networks:
  app_network:
    driver: bridge